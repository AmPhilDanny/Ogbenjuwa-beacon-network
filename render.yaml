# ─── Ogbenjuwa Platform — Render Blueprint ────────────────────────────────
# Connect this repo on Render Dashboard → Blueprint → auto-creates all services

services:
  # ── Backend API (Docker) ────────────────────────────────────────────────
  - type: web
    name: ogbenjuwa-api
    env: docker
    region: frankfurt
    branch: main
    rootDir: central-command
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4001"
      - key: DATABASE_URL
        sync: false      # paste your Supabase connection string in dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://ogbenjuwa-beacon.onrender.com,https://ogbenjuwa-userapps.onrender.com
      - key: REDIS_URL
        value: redis://localhost:6379

  # ── Beacon Network SPA ─────────────────────────────────────────────────
  - type: static_site
    name: ogbenjuwa-beacon
    region: frankfurt
    branch: main
    rootDir: ogbenjuwa-beacon-network
    buildCommand: npm install && npm run build
    publishPath: dist
    autoDeploy: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        value: https://ogbenjuwa-api.onrender.com/api/v1

  # ── User Apps SPA ─────────────────────────────────────────────────────
  - type: static_site
    name: ogbenjuwa-userapps
    region: frankfurt
    branch: main
    rootDir: user-apps
    buildCommand: npm install && npm run build
    publishPath: dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        value: https://ogbenjuwa-api.onrender.com/api/v1
