# ─── Ogbenjuwa Platform — Render Blueprint ────────────────────────────────
# Blueprint supports: web, worker, cron, pserv, postgres, redis
# Static Sites (frontends) must be created manually via Dashboard.

services:
  # ── Backend API (Docker) ────────────────────────────────────────────────
  - type: web
    name: ogbenjuwa-api
    env: docker
    region: frankfurt
    branch: main
    rootDir: central-command
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4001"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://ogbenjuwa-beacon.onrender.com,https://ogbenjuwa-userapps.onrender.com
      - key: REDIS_URL
        value: redis://localhost:6379
