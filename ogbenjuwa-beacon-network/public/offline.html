<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Ogbenjuwa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a1628;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
      text-align: center;
    }
    .shield {
      width: 96px;
      height: 96px;
      margin-bottom: 1.5rem;
      opacity: 0.6;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #fbbf24; }
    p { color: #94a3b8; max-width: 320px; line-height: 1.5; margin-bottom: 2rem; }
    .retry-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry-btn:hover { background: #2563eb; }
    .retry-btn:active { background: #1d4ed8; }
  </style>
</head>
<body>
  <svg class="shield" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="512" height="512" rx="64" fill="#1e3a5f"/>
    <path d="M256 76L396 156V316Q396 416 256 476Q116 416 116 316V156Z" fill="none" stroke="#3b82f6" stroke-width="16" stroke-linejoin="round"/>
    <path d="M256 116L356 176V304Q356 384 256 436Q156 384 156 304V176Z" fill="none" stroke="#60a5fa" stroke-width="8" stroke-linejoin="round"/>
    <polygon points="256,196 270,236 312,236 278,262 290,304 256,278 222,304 234,262 200,236 242,236" fill="#fbbf24" opacity="0.9"/>
  </svg>
  <h1>You're Offline</h1>
  <p>Ogbenjuwa is caching your data. Critical actions will sync automatically when you're back online.</p>
  <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
  <script>
    // Listen for the service worker telling us we're back online
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('message', (event) => {
        if (event.data?.type === 'ONLINE') window.location.reload();
      });
    }
  </script>
</body>
</html>
